workflows:
  ios-app-store:
    name: iOS App Store (Xcode 26)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MetraShop ASC Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mts.metrashop
      vars:
        FLUTTER_VERSION: "3.41.6"
        BUNDLE_ID: "com.mts.metrashop"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      groups:
        - metrashop_secrets
      flutter: 3.41.6
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*.*.*'
          include: true

    scripts:
      - name: Create .env files
        script: |
          cat >> .env << EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          GOOGLE_MAPS_API_KEY_ANDROID=$GOOGLE_MAPS_API_KEY_ANDROID
          GOOGLE_MAPS_API_KEY_IOS=$GOOGLE_MAPS_API_KEY_IOS
          GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID
          GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID
          GOOGLE_ANDROID_CLIENT_ID=$GOOGLE_ANDROID_CLIENT_ID
          EOF
          cp .env .env.dev
          cp .env .env.prod

      - name: Create GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST_BASE64 | base64 --decode > ios/GoogleService-Info.plist

      - name: Create Secret.xcconfig
        script: |
          echo "GOOGLE_MAPS_IOS_API_KEY=$GOOGLE_MAPS_API_KEY_IOS" > ios/Flutter/Secret.xcconfig

      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Generate code (Riverpod + Isar)
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --dart-define=ENV=prod \
            --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
        beta_groups:
          - Internal Testers

