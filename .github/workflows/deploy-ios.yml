name: Deploy iOS

on:
  # Tag-based iOS releases are handled by Codemagic (codemagic.yaml).
  # This workflow is kept for manual one-off deploys only.
  workflow_dispatch:
    inputs:
      destination:
        description: 'Deploy destination'
        required: true
        default: 'testflight'
        type: choice
        options:
          - testflight
          - app-store

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  deploy-ios:
    name: Build & Deploy to App Store
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ============================================
      # CONFIGURACIÓN DE SECRETOS
      # ============================================
      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_MAPS_API_KEY_ANDROID=${{ secrets.GOOGLE_MAPS_API_KEY_ANDROID }}" >> .env
          echo "GOOGLE_MAPS_API_KEY_IOS=${{ secrets.GOOGLE_MAPS_API_KEY_IOS }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env
          echo "GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}" >> .env
          echo "GOOGLE_ANDROID_CLIENT_ID=${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}" >> .env
          cp .env .env.dev
          cp .env .env.prod
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # ============================================
      # CONFIGURACIÓN DE CERTIFICADOS iOS
      # ============================================
      - name: Install Apple Certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Crear variables
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decodificar certificado
          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Crear keychain temporal
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Importar certificado al keychain
          security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Crear directorio de provisioning profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # ============================================
      # BUILD
      # ============================================
      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (Riverpod, Isar, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create GoogleService-Info.plist
        env:
          PLIST_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo -n "$PLIST_B64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Create Secret.xcconfig
        run: |
          echo "GOOGLE_MAPS_IOS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY_IOS }}" > ios/Flutter/Secret.xcconfig

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          BUILD_NUMBER=$(grep -oP 'version: .*\+\K\d+' pubspec.yaml || echo "1")
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          echo "BUILD_NUMBER=$NEW_BUILD_NUMBER" >> $GITHUB_ENV

      - name: Build iOS Release
        run: |
          if [ -n "$VERSION" ]; then
            flutter build ipa --release --dart-define=ENV=prod --build-name=$VERSION --build-number=$BUILD_NUMBER --export-options-plist=ios/ExportOptions.plist
          else
            flutter build ipa --release --dart-define=ENV=prod --export-options-plist=ios/ExportOptions.plist
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30

      # ============================================
      # DEPLOY A APP STORE CONNECT
      # ============================================
      - name: Determine destination
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DESTINATION=${{ github.event.inputs.destination }}" >> $GITHUB_ENV
          else
            echo "DESTINATION=testflight" >> $GITHUB_ENV
          fi

      - name: Find IPA path
        run: |
          IPA_PATH=$(find build/ios/ipa -name '*.ipa' | head -1)
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV

      - name: Decode App Store Connect API Key
        id: asc-key
        env:
          ASC_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # Decode the .p8 key content (required by apple-actions)
          KEY_CONTENT=$(echo -n "$ASC_KEY_B64" | base64 --decode)
          echo "key_content<<EOF" >> $GITHUB_OUTPUT
          echo "$KEY_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # xcrun altool fue eliminado en Xcode 16.
      # apple-actions/upload-testflight-build usa la App Store Connect API REST.
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ steps.asc-key.outputs.key_content }}

      # ============================================
      # CLEANUP
      # ============================================
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/certificate.p12
          rm -f $RUNNER_TEMP/build_pp.mobileprovision
          rm -rf ~/.appstoreconnect

      - name: Notify success
        if: success()
        run: |
          echo "🍎 iOS build deployed successfully to ${{ env.DESTINATION }}!"
          echo "Bundle ID: com.mts.metrashop"
          echo "Version: ${{ env.VERSION || 'from pubspec' }}"
